site_name: Cassandra Learning Labs
site_description: Cassandra CQL labs and Spring Boot learning path
theme:
  name: journal
  features:
    - content.code.copy
    - content.code.annotate
nav:
  - Home: index.md
  - Labs Guide: labs-guide.md
  - Interview Questions: interview-questions.md

markdown_extensions:
  - admonition
  - pymdownx.inlinehilite
  - pymdownx.superfences
  - pymdownx.details
plugins:
  - search
  - mermaid2
