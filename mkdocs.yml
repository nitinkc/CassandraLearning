site_name: Cassandra Learning Labs
site_description: Cassandra CQL labs and Spring Boot learning path
theme:
  name: journal
  color_mode: auto
  user_color_mode_toggle: true
nav:
  - Home: index.md
  - Theory:
      - NoSQL & Cassandra: theory/01-nosql-and-cassandra.md
      - Core Concepts: theory/02-core-concepts.md
      - Data Modeling: theory/03-data-modeling.md
      - Indexes & Materialized Views: theory/04-indexes-and-mv.md
      - Consistency, LWT & Batching: theory/05-consistency-lwt-batch.md
      - TTL & Tombstones: theory/06-ttl-tombstones.md
      - Aggregation & Counters: theory/07-aggregation-counters.md
      - Advanced Topics: theory/08-advanced.md
  - Labs Overview: labs-overview.md
  - Interview Prep: interview-prep.md

markdown_extensions:
  - admonition
  - pymdownx.inlinehilite
  - pymdownx.superfences
  - pymdownx.details
  - pymdownx.highlight:
      use_pygments: true
      linenums: false
plugins:
  - search

extra_javascript:
  - https://unpkg.com/mermaid@10.9.0/dist/mermaid.min.js
  - js/mermaid-init.js
